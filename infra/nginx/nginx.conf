
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    log_format json escape=json
      '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time"'
      '}';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;


    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    client_body_buffer_size 1M;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/atom+xml image/svg+xml;
    gzip_disable "msie6";


    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

    map $request_method $skip_cache {
        default 1;
        GET 0;
        HEAD 0;
    }

    map $request_uri $cache_key {
        default "$scheme$request_method$host$request_uri";
    }

    # Zone for API rate limiting (10MB zone, 10 req/sec)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=2r/s;
    limit_req_status 429;

    # Backend application pool - least_conn load balancing
    upstream vybe_backend {
        least_conn;
        
        server backend_app1:5000 max_fails=3 fail_timeout=30s weight=1;
        server backend_app2:5000 max_fails=3 fail_timeout=30s weight=1;
        
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # Frontend application
    upstream vybe_frontend {
        server frontend:3000;
        keepalive 16;
    }


    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # SECURITY HEADERS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

        # HEALTH CHECK ENDPOINT (no logging, no rate limit)
        location /health {
            # Health check for nginx itself
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # BACKEND API ROUTES
        location ~ ^/api/v1/health {
            # Backend health check - proxy to one instance
            access_log off;
            proxy_pass http://vybe_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        location ~ ^/api/v1/ {
            # Apply rate limiting to API
            limit_req zone=api_limit burst=20 nodelay;
            
            # Proxy configuration
            proxy_pass http://vybe_backend;
            proxy_http_version 1.1;
            
            # Connection pooling
            proxy_set_header Connection "";
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Request-ID $request_id;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Failover
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;

            # Caching (only for GET requests, respect cache headers)
            proxy_cache api_cache;
            proxy_cache_key "$cache_key";
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            proxy_cache_bypass $skip_cache;
            proxy_no_cache $skip_cache;
            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Cache-Key $cache_key;
        }

        # FRONTEND ROUTES
        location / {
            # Frontend - Next.js application
            proxy_pass http://vybe_frontend;
            proxy_http_version 1.1;
            
            # Connection pooling
            proxy_set_header Connection "";
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            
            # Failover
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }

        # STATIC FILES (with caching)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://vybe_frontend;
            proxy_cache api_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
        }


        # ERROR PAGES
        error_page 502 503 504 /50x.html;
        error_page 404 /404.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # Prometheus scrape endpoint
    server {
        listen 9100;
        server_name _;

        location /metrics {
            proxy_pass http://localhost:9100/metrics;
            access_log off;
        }
    }
}
