global:
  resolve_timeout: 5m
  # NOTE: Alert webhook (Discord uses Slack-compatible webhook format)
  # Alertmanager requires these keys to be named "slack_*" even for Discord
  slack_api_url: "${DISCORD_WEBHOOK_URL}"

route:
  group_by:
    - alertname
    - instance
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: discord_notifications

receivers:
  # Discord webhook receiver (via proxy that transforms payload format)
  - name: discord_notifications
    webhook_configs:
      - url: "http://webhook_proxy:5001/webhook"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - instance
