global:
  resolve_timeout: 5m
  # NOTE: Alert webhook (Discord uses Slack-compatible webhook format)
  # Alertmanager requires these keys to be named "slack_*" even for Discord
  slack_api_url: "https://discord.com/api/webhooks/1490023453212938353/7GojR7ehPDNfJ3Jx74E-FUhf7cnCl193pMFNsubhhlqfRyS_A4GI-TbNNPTP8GjazSOY"

route:
  group_by:
    - alertname
    - instance
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: discord_notifications

receivers:
  # Discord webhook receiver (sends to Discord #alerts channel)
  - name: discord_notifications
    slack_configs:
      - api_url: "https://discord.com/api/webhooks/1490023453212938353/7GojR7ehPDNfJ3Jx74E-FUhf7cnCl193pMFNsubhhlqfRyS_A4GI-TbNNPTP8GjazSOY/slack"
        channel: "#alerts"
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - instance
