global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: vybe

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: vybe
    metrics_path: /metrics
    static_configs:
      - targets:
          - vybe_app1:5000
          - vybe_app2:5000
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # System-level metrics (CPU, memory, disk, network)
  - job_name: node_exporter
    static_configs:
      - targets:
          - node_exporter:9100

  # Container-level metrics (per-container resources)
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  # PostgreSQL database metrics
  - job_name: postgres
    static_configs:
      - targets:
          - postgres_exporter:9187

  # Redis cache metrics
  - job_name: redis
    static_configs:
      - targets:
          - redis_exporter:9121
   
