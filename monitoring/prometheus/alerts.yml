groups:
  - name: vybe_alerts
    rules:
      # Application alerts
      - alert: HighErrorRate
        expr: rate(http_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: High5xxRate
        expr: rate(http_errors_total{status=~"5.."}[5m]) > 0.02
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate"
          description: "5xx error rate is {{ $value | humanizePercentage }} on instance {{ $labels.instance }}. This indicates server-side issues."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency (p95 > 1s)"
          description: "P95 latency is {{ $value }}s on instance {{ $labels.instance }}."

      - alert: InstanceDown
        expr: up{job="vybe"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Vybe instance down"
          description: "Instance {{ $labels.instance }} is unreachable."

      # System resource alerts
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="vybe"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanize }}% on instance {{ $labels.instance }}."

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes{name=~"vybe_app.*"} / container_spec_memory_limit_bytes{name=~"vybe_app.*"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanize }}% on container {{ $labels.name }}."

      - alert: ContainerRestarting
        expr: rate(container_last_seen{name=~"vybe_app.*"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container restarting frequently"
          description: "Container {{ $labels.name }} is restarting frequently."

      # Database alerts
      - alert: PostgresTooManyConnections
        expr: sum(pg_stat_database_numbackends) / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL too many connections"
          description: "PostgreSQL is using {{ $value | humanize }}% of max connections."

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database is unreachable."

      - alert: PostgresSlowQueries
        expr: rate(pg_stat_database_tup_fetched[5m]) / rate(pg_stat_database_tup_returned[5m]) < 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "Query efficiency is low ({{ $value | humanizePercentage }}). May indicate missing indexes or inefficient queries."

      # Redis alerts
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis cache is unreachable."

      - alert: RedisHighMemoryUsage
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis is using {{ $value | humanize }}% of max memory."

      - alert: RedisHighEvictionRate
        expr: rate(redis_evicted_keys_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high eviction rate"
          description: "Redis is evicting {{ $value | humanize }} keys/sec. Consider increasing memory."
