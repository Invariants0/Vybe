groups:
  - name: vybe_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency (p95 > 1s)"
          description: "P95 latency is {{ $value }}s on instance {{ $labels.instance }}."

      - alert: InstanceDown
        expr: up{job="vybe"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Vybe instance down"
          description: "Instance {{ $labels.instance }} is unreachable."
