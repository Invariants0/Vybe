networks:
  vybe_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:


x-vybe-common: &vybe-common
  build:
    context: .
    dockerfile: infra/docker/Dockerfile
  env_file:
    - ./backend/.env
  restart: unless-stopped
  networks:
    - vybe_network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  vybe_app1:
    <<: *vybe-common
    container_name: vybe_app1
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/ready" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s

  vybe_app2:
    <<: *vybe-common
    container_name: vybe_app2
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/ready" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s


  db:
    image: postgres:16-alpine
    container_name: vybe_db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-hackathon_db}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-hackathon_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - vybe_network

  redis:
    image: redis:7-alpine
    container_name: vybe_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - vybe_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: vybe_nginx
    depends_on:
      vybe_app1:
        condition: service_healthy
      vybe_app2:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - vybe_network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: vybe_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - vybe_network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: vybe_grafana
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - vybe_network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: vybe_alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/config.yml.template:ro
      - ./monitoring/alertmanager/entrypoint.sh:/entrypoint.sh:ro
    env_file:
      - ./backend/.env
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - vybe_network
    depends_on:
      - webhook_proxy

  webhook_proxy:
    build:
      context: ./monitoring/webhook-proxy
      dockerfile: Dockerfile
    container_name: vybe_webhook_proxy
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - vybe_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # System metrics exporter (host-level CPU, memory, disk, network)
  node_exporter:
    image: prom/node-exporter:v1.8.0
    container_name: vybe_node_exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - '/:/host:ro'
    restart: unless-stopped
    networks:
      - vybe_network

  # Container metrics exporter (per-container CPU, memory, network, disk I/O)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: vybe_cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - vybe_network

  # PostgreSQL metrics exporter
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: vybe_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-hackathon_db}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vybe_network

  # Redis metrics exporter
  redis_exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: vybe_redis_exporter
    environment:
      REDIS_ADDR: "redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vybe_network
